services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-UTC}
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.1"
    init: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ..:/workspace:cached
      - gh-config:/home/vscode/.config/gh
      - vscode-ssh:/home/vscode/.ssh
    ports:
      - "127.0.0.1:2290:22"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -lc '
        set -euo pipefail
        sudo mkdir -p /run/sshd /home/vscode/.ssh /home/vscode/.config/gh
        sudo ssh-keygen -A
        sudo chown -R vscode:vscode /home/vscode/.ssh /home/vscode/.config/gh
        chmod 700 /home/vscode/.ssh
        touch /home/vscode/.ssh/authorized_keys
        chmod 600 /home/vscode/.ssh/authorized_keys
        sync-github-authorized-keys || true
        sudo /usr/sbin/sshd
        exec sleep infinity
      '

  db:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: church_giving_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gh-config:
  postgres-data:
  redis-data:
  vscode-ssh:
